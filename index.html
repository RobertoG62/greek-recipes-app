<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="המטבח היווני — מתכונים אותנטיים מיווני, בעברית.">
    <meta property="og:title" content="המטבח היווני">
    <meta property="og:description" content="מתכונים אותנטיים מהלב של אתונה">
    <meta property="og:type" content="website">
    <title>המטבח היווני — מתכונים אותנטיים</title>

    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gr-primary': '#0D47A1',
                        'gr-primary-light': '#90CAF9',
                        'gr-primary-dark': '#0A3170',
                        'gr-cream': '#FAFAFA',
                        'gr-charcoal': '#1A1A1A',
                        'gr-navy': '#0A1628',
                        'gr-warm-gray': '#F5F0EB',
                        'gr-text-secondary': '#6B7280',
                        'gr-border': '#E5E1DC',
                        'gr-success': '#16A34A',
                        'gr-warning': '#D97706',
                        'gr-danger': '#DC2626',
                    },
                    fontFamily: {
                        'heebo': ['Heebo', 'sans-serif'],
                        'playfair': ['Playfair Display', 'serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gr-cream font-heebo text-gr-charcoal min-h-screen">

    <!-- Header -->
    <header id="app-header" class="fixed top-0 right-0 left-0 z-50 transition-all duration-200">
        <div class="max-w-6xl mx-auto px-4 h-16 md:h-18 flex items-center justify-between">
            <a href="#/" id="header-logo" class="flex items-center gap-2">
                <span class="text-gr-primary text-2xl"><i class="fas fa-fish"></i></span>
                <span class="font-playfair font-bold text-lg md:text-xl text-gr-charcoal">המטבח היווני</span>
            </a>
            <div class="flex items-center gap-3">
                <!-- Language Switcher -->
                <div class="language-switcher">
                    <button class="lang-btn active" data-lang="he">HE</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <!-- Back Button -->
                <button id="back-btn" class="hidden items-center gap-2 text-gr-charcoal hover:text-gr-primary transition-colors text-sm font-medium">
                    <span>חזרה למתכונים</span>
                    <i class="fas fa-arrow-left"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Home View -->
        <div id="home-view">
            <!-- Hero Section -->
            <section id="hero" class="home-hero relative flex items-center justify-center text-center overflow-hidden">
                <div class="relative z-10 px-4 w-full max-w-2xl mx-auto">
                    <h1 class="font-playfair text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-3">
                        המטבח <span class="text-gr-primary">היווני</span>
                    </h1>
                    <p class="text-gray-300 text-lg md:text-xl mb-8 font-light">
                        מתכונים אותנטיים מהלב של אתונה
                    </p>
                    <!-- Search Bar -->
                    <div class="relative max-w-md mx-auto">
                        <div class="glass-search flex items-center rounded-xl overflow-hidden">
                            <span class="pr-4 pl-2 text-gr-primary"><i class="fas fa-search"></i></span>
                            <input
                                id="search-input"
                                type="text"
                                placeholder="חיפוש מתכון..."
                                class="w-full py-3 pl-4 bg-transparent text-white placeholder-gray-400 outline-none text-base"
                            >
                            <button id="search-clear" class="hidden pl-4 pr-2 text-gray-400 hover:text-white transition-colors">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Category Filters -->
            <section class="sticky top-16 md:top-18 z-40 bg-gr-cream/95 backdrop-blur-sm border-b border-gr-border">
                <div class="max-w-6xl mx-auto px-4 py-3">
                    <div id="category-filters" class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide"></div>
                    <div id="result-count" class="text-gr-text-secondary text-sm mt-2 hidden"></div>
                </div>
            </section>

            <!-- Recipe Grid -->
            <section class="max-w-6xl mx-auto px-4 py-8">
                <div id="recipe-grid" class="grid gap-6" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));"></div>

                <!-- Empty State -->
                <div id="empty-state" class="hidden text-center py-16">
                    <div class="text-6xl mb-4 text-gr-primary opacity-50"><i class="fas fa-search"></i></div>
                    <h3 class="text-xl font-bold text-gr-charcoal mb-2">לא נמצאו מתכונים</h3>
                    <p class="text-gr-text-secondary mb-4">נסו לשנות את מילות החיפוש או לבחור קטגוריה אחרת</p>
                    <button id="clear-filters-btn" class="px-6 py-2 bg-gr-primary text-white rounded-lg hover:bg-gr-primary-dark transition-colors font-medium">
                        נקה חיפוש
                    </button>
                </div>

                <!-- Loading State -->
                <div id="loading-state" class="text-center py-16">
                    <div class="spinner mb-4"></div>
                    <p class="text-gr-text-secondary">טוען מתכונים...</p>
                </div>
            </section>
        </div>

        <!-- Recipe Detail View -->
        <div id="recipe-view" class="hidden"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-gr-navy text-gray-400 py-8 mt-8">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p class="font-heebo text-sm">
                המטבח היווני — מתכונים אותנטיים מיווני, בעברית
                <span class="text-gr-primary mx-1"><i class="fas fa-heart"></i></span>
            </p>
        </div>

        <!-- Back to Hub -->
        <div class="py-12 bg-gr-primary/10 border-t border-gr-primary/30 mt-8">
            <div class="max-w-6xl mx-auto px-4 text-center">
                <a href="https://robertog62.github.io/recipes-world-hub/" target="_blank" rel="noopener noreferrer"
                   class="inline-flex items-center gap-3 border-2 border-gr-primary bg-gr-primary/15 text-gr-primary font-playfair font-bold text-base md:text-lg px-10 py-4 rounded-full hover:bg-gr-primary hover:text-white transition-all duration-300 tracking-wide shadow-lg shadow-gr-primary/20">
                    <i class="fa-solid fa-globe text-lg"></i>
                    <span>לעוד מתכוני עולם — חזרה לרכזת המתכונים</span>
                    <i class="fa-solid fa-arrow-up-right-from-square text-sm"></i>
                </a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
